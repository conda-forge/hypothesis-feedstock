schema_version: 1

context:
  version: 6.156.9

package:
  name: hypothesis
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/hypothesis/hypothesis-${{ version }}.tar.gz
  sha256: 277ed68a0cf5f0b4cb4a3eabf2cb2962c97f1b565fa731ad6a297bd3b9573af5

build:
  number: 0
  skip: match(python, "<3.10")
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - hypothesis = hypothesis.extra.cli:main

requirements:
  build:
    - cargo-bundle-licenses
    - ${{ compiler("c") }}
    - ${{ compiler("rust") }}
    - ${{ stdlib("c") }}
    - maturin >=1.7,<2.0
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - pip
    - maturin >=1.7,<2.0
    # This is a maturin dep.
    - puccinialin
  run:
    - python
    - exceptiongroup >=1.0.0
    - sortedcontainers >=2.1.0,<3.0.0
tests:
  - python:
      imports:
        - hypothesis
      pip_check: true
  - requirements:
      run:
        - pip
        - django
        - pandas
    script:
      - hypothesis --help

about:
  summary: The property-based testing library for Python
  license: MPL-2.0
  license_file: LICENSE.txt
  homepage: https://pypi.org/project/hypothesis/

extra:
  recipe-maintainers:
    - ericmjl
    - jochym
    - ocefpaf
    - tadeu
